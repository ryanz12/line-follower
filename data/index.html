<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <h1>Robot Dashboard</h1>
    </div>
    <div class="content">
        <div class="container">
            <h2 id="robot-state" class="robot-off">Robot Status: OFF</h2>
            <div class="pChartContainer">
                <canvas id="positionChart"></canvas>
            </div>
            <div class="sChartContainer">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>
        <div class="control-panel">
            <h3>Control Panel</h3>
            <button id="powerButton" class="button-on">Turn ON</button>
            <button id="recalibrateButton">Recalibrate</button>
            <div class="sliderContainer">
                <label for="slider" id="speedLabel">Speed: 100</label>
                <input type="range" name="slider" id="speedSlider" min="0" max="255" value="100">
            </div>
            <p>Tuning Constants</p>
            <div class="tuningContainer">
                <label for="kP">kP</label>
                <input type="text" name="kP" id="kPInput" value="0">
                <label for="kI">kI</label>
                <input type="text" name="kI" id="kIInput" value="0">
                <label for="kD">kD</label>
                <input type="text" name="kD" id="kDInput" value="0">
            </div>
            <div class="setpointContainer">
                <label for="setpoint">Setpoint</label>
                <input type="text" name="setpoint" id="setpointInput" placeholder="3500">
            </div>
        </div>
    </div>
    <script src="/chart.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
