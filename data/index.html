<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <h1>Clanker Controller</h1>
    </div>
    <div class="content">
        <div class="container">
            <h2>Robot Mode</h2>
            <p id="robot-state"></p>
            <button id="powerButton">Toggle</button>
            <button id="recalibrate">Recalibrate</button>
            <div class="sliderContainer">
                <label for="slider">Speed: </label>
                <input type="range" name="slider" id="speed" min="0" max="255" value="100">
            </div>
            <div class="tuningContainer">
                <label for="kP">kP</label>
                <input type="text" name="kP" id="kP" value="0">
                <label for="kI">kI</label>
                <input type="text" name="kI" id="kI" value="0">
                <label for="kD">kD</label>
                <input type="text" name="kD" id="kD" value="0">
            </div>
        </div>
    </div>
    <script src="/chart.js"></script>
    <canvas id="positionChart"></canvas>
    <script src="script.js"></script>
</body>
</html>
